<!DOCTYPE html>
  <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width , intial-scale=1.0">
           <script src="main.js" defer></script>
             <link rel="stylesheet" href="style.css">
        <title>CalculatorV2</title>
        
    </head>
        <body>
            <div id="main">

                <div id="display-box">

                    <div id="number-box">
                        <p class="curr-display">0</p>
                    </div>
                    <hr>

                    <div id="operator-box">
                         <p class="operator-display"></p>
                    </div>

                </div>
            <div id="button-container">
                <div id="leftButtons">

                <div id="top">
                    <button class="specialBtn" id="reset">C</button>
                    <button class="specialBtn" id="erase">Del</button>
                    <button class="nButton" id="decimal">.</button>
                  </div>

                    <button class="nButton" id="btn7">7</button>
                    <button class="nButton" id="btn8">8</button>
                    <button class="nButton" id="btn9">9</button>
                    <button class="nButton" id="btn4">4</button>
                    <button class="nButton" id="btn5">5</button>
                    <button class="nButton" id="btn6">6</button>
                    <button class="nButton" id="btn1">1</button>
                    <button class="nButton" id="btn2">2</button>
                    <button class="nButton" id="btn3">3</button>
                    <button class="nButton" id="btn0">0</button>
                </div>


                <div id="rightButtons">
                    <button class="operatorButton" id="divideBtn">÷</button>
                    <button class="operatorButton" id="multiplyBtn">X</button>
                    <button class="operatorButton" id="subtractBtn">-</button>
                    <button class="operatorButton" id="addBtn">+</button>

                    <button class="operatorButton" id="calcBtn">=</button>
                </div>

            </div>





















            </div>
        </body>



  </html>
